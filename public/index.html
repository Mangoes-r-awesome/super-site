const { useState, useEffect, useRef, useCallback } = React;

// ─── ANIMATED COUNTER ───
function Counter({ end, suffix = "", duration = 1000 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const num = parseFloat(end);
        const steps = 60;
        const inc = num / steps;
        let cur = 0;
        const iv = setInterval(() => {
          cur += inc;
          if (cur >= num) { setVal(num); clearInterval(iv); }
          else setVal(Math.round(cur * 10) / 10);
        }, duration / steps);
      }
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [end, duration]);
  const display = Number.isInteger(parseFloat(end)) ? Math.round(val).toLocaleString() : val.toFixed(1);
  return <span ref={ref}>{display}{suffix}</span>;
}
